name: SIP Statistical Analysis

on:
  workflow_dispatch:
    inputs:
      notes:
        description: "Optional notes for this run"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  analyze:
    name: Run TableOne Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Run analysis
        run: uv run python scripts/run_analysis.py

      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "chore: update analysis results [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push


